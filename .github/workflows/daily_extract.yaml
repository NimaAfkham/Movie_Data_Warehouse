name: Daily Movie Data Extraction

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  extract-and-load:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run extraction script (Bronze)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python extraction/extract_load.py

      - name: Run transform script (Silver)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python transformation/transform_load.py

      - name: Send Telegram digest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python telegram_bot/daily_digest.py
